services:
  - type: web
    name: techcare-platform
    env: node
    buildCommand: npm run build
    startCommand: npm start
    plan: free
    disk:
      name: database
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/techcare.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GEMINI_API_KEY
        sync: false
